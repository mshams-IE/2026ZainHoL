---

- name: Remove Hands on Lab Assets
  hosts: localhost
  connection: local
  gather_facts: no
  tags:
    - env
  tasks:

############# Environment Discovery & Validation #############
        
    - name: Gather details about the CDP environment
      tags:
        - always
      block:
        # Find details about the environment
        - name: Set environment name from either pre-existing environment or Terraform outputs
          ansible.builtin.set_fact:
            cdp_environment_name: "{{ cdp_env if cdp_env is defined else lookup('cloud.terraform.tf_output', 'cdp_environment_name', project_path=[playbook_dir,'tf-cdp-env'] | path_join) }}"

        - name: Query for the CDP Public Cloud Environment
          cloudera.cloud.env_info:
            name: "{{ cdp_environment_name }}"
          register: __env

        - name: Verify that environment is in running state
          ansible.builtin.assert:
            that:
              - __env.environments | length == 1
              - __env.environments[0].status == 'AVAILABLE'
            fail_msg: "Environment '{{ cdp_environment_name }}' not found or not in Available state"

        # Find details about datalake
        - name: Query for the CDP Public Cloud Datalake
          cloudera.cloud.datalake_info:
            environment: "{{ cdp_environment_name }}"
          register: __dl

        - name: Assert existence of the CDP Public Cloud Datalake
          ansible.builtin.assert:
            that:
              - __dl.datalakes | length == 1
              - __dl.datalakes[0].status == "RUNNING"
            fail_msg: "CDP Public Cloud target Datalake either is missing or invalid: {{ cdp_environment_name }}"
            quiet: yes        

############# CDE Cleanup #############

    - name: Data Engineering Cleanup
      tags:
        - cde
      block:

        # Find details about CDE service
        - name: Retrieve details of CDE Deployment
          cloudera.cloud.de_info:
              name: "{{ de.definitions[0].name }}"
              environment: "{{ cdp_environment_name }}"
          register: __cde_info

        - name: Assert existence of the CDE Data Service
          ansible.builtin.assert:
            that:
              - __cde_info.services | length == 1
              - __cde_info.services[0].status == "ClusterCreationCompleted"
            fail_msg: "{{ de.definitions[0].name }} Data Engineering Data Service either is missing or in invalid state"
            quiet: yes

        - name: Retrieve details of CDE VC Deployment
          cloudera.cloud.de_virtual_cluster_info:
              cluster_name: "{{ de.definitions[0].name }}"
              environment: "{{ cdp_environment_name }}"
              name: "{{ de.definitions[0].vc.name }}"
          register: __cde_vc_info

        - name: Assert status of the CDE Virtual Cluster
          ansible.builtin.assert:
            that:
              - __cde_vc_info.vcs | length == 1
              - __cde_vc_info.vcs[0].status == "AppInstalled"
            fail_msg: "{{ de.definitions[0].vc.name }} Data Engineering Virtual Cluster either is missing or in invalid state"
            quiet: yes

        - name: Retrieve CDE access token
          ansible.builtin.expect:
            command: "curl -u {{ cdp_workload_username }} https://{{ __cde_info.services[0].clusterFqdn }}/gateway/authtkn/knoxtoken/api/v1/token"
            responses:
              '(?i)password': "{{ cdp_workload_password }}"
          register: __token_request

        - name: Extract access token
          ansible.builtin.set_fact:
            __cde_access_token: "{{ __token_request.stdout_lines | select('match', '^\\{.*\\}$') | first | from_json | json_query('access_token') }}"

        - name: Retrieve details of CDE jobs
          ansible.builtin.uri:
            url: "{{ __cde_vc_info.vcs[0].vcApiUrl }}/jobs"
            method: GET
            headers:
              Authorization: "Bearer {{ __cde_access_token }}"
              Accept: "*/*"
              Content-Type: "application/json"
          register: __cde_job_check

        - name: Delete Spark CDE jobs
          when:
            - "{{ (item | regex_replace('.py', '')) in __cde_job_check.json.jobs | map(attribute='name') }}"     
          ansible.builtin.uri:
            url: "{{ __cde_vc_info.vcs[0].vcApiUrl }}/jobs/{{ item | regex_replace('.py', '') }}"
            method: DELETE
            headers:
              Authorization: "Bearer {{ __cde_access_token }}"
              Accept: "application/json"
            status_code: 204
          loop:
            - CDE-updateTable.py
            - CDE-telco_data_enrichment.py

        - name: Check if the folder already exists
          ansible.builtin.uri:
            url: "{{ __cde_vc_info.vcs[0].vcApiUrl }}/resources?includeFiles=true"
            method: GET
            headers:
              Authorization: "Bearer {{ __cde_access_token }}"
              Accept: "*/*"
              Content-Type: "application/json"
          register: __cde_folder_check

        - name: Delete CDE folder resources
          when:
           - "{{ 'Telco_Churn' in __cde_folder_check.json.resources | map(attribute='name') }}"
          ansible.builtin.uri:
            url: "{{ __cde_vc_info.vcs[0].vcApiUrl }}/resources/Telco_Churn"
            method: DELETE
            headers:
              Authorization: "Bearer {{ __cde_access_token }}"
              Accept: "*/*"
            status_code: 204

        # - name: Process parameters.conf template
        #   when:
        #    - "{{ 'parameters.conf' not in __cde_folder_check.json.resources | community.general.json_query('[?name==`Telco_Churn`].files[].path') }}"
        #   block:
        #     - name: Create parameters.conf file
        #       ansible.builtin.template:
        #         src: files/cde/parameters.conf.j2
        #         dest: files/cde/parameters.conf
        #       register: __cde_parameters_conf
        #       vars:
        #         CDP_STORAGE_BUCKET: "{{ __dl.datalakes[0].cloudStorageBaseLocation }}"
        
        # - name: Ensure files are uploaded to CDE VC resources
        #   when:
        #    - "{{ item not in __cde_folder_check.json.resources | community.general.json_query('[?name==`Telco_Churn`].files[].path') }}"
        #   ansible.builtin.uri:
        #     url: "{{ __cde_vc_info.vcs[0].vcApiUrl }}/resources/Telco_Churn/{{ item }}"
        #     method: PUT
        #     headers:
        #       Authorization: "Bearer {{ __cde_access_token }}"
        #       Accept: "*/*"
        #       Content-Type: "multipart/form-data"
        #     body_format: form-multipart
        #     body:
        #       file:
        #         filename: "files/cde/{{ item }}"
        #     status_code: 
